name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  electron-pack:
    name: Electron 打包
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron app
        run: pnpm electron:build
        env:
          # CI 无签名证书，跳过 macOS 代码签名
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Check build output
        run: |
          release_dir="apps/editor/release"
          if [ ! -d "$release_dir" ]; then
            echo "Error: release directory not found"
            exit 1
          fi
          echo "Release files:"
          ls -la "$release_dir/"
          if ! ls "$release_dir"/mac-*/MD\ Render.app >/dev/null 2>&1; then
            echo "Error: MD Render.app not found"
            exit 1
          fi
          if ! ls "$release_dir"/*.dmg >/dev/null 2>&1; then
            echo "Error: dmg file not found"
            exit 1
          fi

      - name: Upload Electron artifact
        uses: actions/upload-artifact@v4
        with:
          name: electron-mac
          path: |
            apps/editor/release/*.dmg
            apps/editor/release/*.blockmap
          retention-days: 7
